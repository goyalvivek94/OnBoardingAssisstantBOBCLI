name: Generate Quiz and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'data/**' # Trigger when policy documents change
      - 'templates/**'
      - 'static/**'
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install IBM BOB CLI
        shell: powershell
        run: |
          # Download and execute the PowerShell installation script non-interactively
          irm -Uri "https://bob.ibm.com/download/bobshell.ps1" -OutFile install.ps1
          powershell -ep Bypass .\install.ps1 -PackageManager npm
          Remove-Item install.ps1
          
          # Add BOB to path for subsequent steps
          "$env:USERPROFILE\.bob\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install langchain langchain-text-splitters python-docx

      - name: Generate Static Quiz Data
        # We run the backend offline to pre-generate the quiz questions
        # and output them as a static JSON file in the static directory.
        env:
          BOB_API_KEY: ${{ secrets.IBM_BOB_KEY }}
        run: |
          python -c "
          import onboarding_backend
          import json
          import os
          import traceback
          import shutil
          
          print('BOB CLI on PATH:', shutil.which('bob.cmd') or shutil.which('bob') or shutil.which('bob.ps1') or shutil.which('bob.exe'))
          
          # Generate a set of questions for each difficulty
          for diff in ['easy', 'medium', 'hard']:
              try:
                  print(f'Generating {diff} difficulty quiz...')
                  quiz_data = onboarding_backend.generate_quiz_questions(difficulty=diff)
                  # Save questions to static folder
                  os.makedirs('static', exist_ok=True)
                  with open(f'static/quiz_data_{diff}.json', 'w') as f:
                      json.dump(quiz_data['questions'], f, indent=2)
                  print(f'Successfully pre-generated static/quiz_data_{diff}.json')
              except Exception as e:
                  print(f'Error generating {diff}: {e}')
                  traceback.print_exc()
                  # Check directory contents
                  bob_dir = os.path.expanduser('~/.bob/bin')
                  if os.path.exists(bob_dir):
                      print('Contents of ~/.bob/bin:', os.listdir(bob_dir))
                  else:
                      print('~/.bob/bin does not exist!')
                  exit(1)
          "

      - name: Prepare Static Website Files
        # On Windows runner, we use PowerShell to copy the index page
        # and replace absolute asset references with relative ones.
        shell: powershell
        run: |
          Copy-Item -Path "templates/index.html" -Destination "index.html" -Force
          (Get-Content index.html).Replace('/static/', 'static/') | Set-Content index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Deploy the root (including index.html and static/)
          branch: gh-pages # Target branch for GitHub Pages
          clean: true
